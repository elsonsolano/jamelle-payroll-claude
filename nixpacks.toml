[phases.setup]
# Explicitly declare PHP 8.3, Composer, and Node 20.
# Specifying nixPkgs overrides auto-detection, so all required packages must be listed.
nixPkgs = [
    "php83",
    "php83Packages.composer",
    "php83Extensions.bcmath",
    "php83Extensions.ctype",
    "php83Extensions.curl",
    "php83Extensions.dom",
    "php83Extensions.fileinfo",
    "php83Extensions.mbstring",
    "php83Extensions.mysqlnd",
    "php83Extensions.pdo",
    "php83Extensions.pdo_mysql",
    "php83Extensions.tokenizer",
    "php83Extensions.xml",
    "php83Extensions.zip",
    "nodejs_20",
    "nginx"
]

[phases.install]
cmds = [
    "mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs",
    "chmod -R 775 bootstrap/cache storage",
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
# config:cache runs at startup so Railway's DB env vars are available when it executes.
# php artisan serve binds to Railway's dynamic $PORT.
cmd = "bash start.sh"
